<!DOCTYPE html>
<html lang="{{ page.lang | default: 'en' }}">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="{{ page.title | default: site.title }}">
    <meta property="og:description" content="{{ page.meta_description | default: site.description }}">
    <meta property="og:image" content="{{ page.image | default: 'https://betashorts.com/logo.jpg' }}">
    <meta property="og:url" content="https://betashorts.com{{ page.url }}">
    <meta property="og:type" content="article">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ page.title | default: site.title }}">
    <meta name="twitter:description" content="{{ page.meta_description | default: site.description }}">
    <meta name="twitter:image" content="{{ page.image | default: 'https://betashorts.com/logo.jpg' }}">
    <meta name="twitter:site" content="@betashorts0">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="/css/styles.css">
    {{ page.meta | default: "" }}

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-DPWTFCZR4X"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-DPWTFCZR4X');
</script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebPage",
  "headline": "{{ page.title }}",
  "image": "https://betashorts.com/logo.jpg", 
  "author": {
    "@type": "Person",
    "name": "Beta Shorts"
  },
  "publisher": {
    "@type": "Organization",
    "name": "Beta Shorts",
    "logo": {
      "@type": "ImageObject",
      "url": "https://betashorts.com/logo.jpg"
    },
  "potentialAction": {
    "@type": "SearchAction",
    "target": "https://betashorts.com/search?q={search_term_string}",
    "query-input": "required name=search_term_string"
  }
  },
  "datePublished": "{{ page.date | date: '%Y-%m-%d' }}",
  "dateModified": "{{ page.date | date: '%Y-%m-%d' }}",
  "description": "{{ page.meta_description | default: site.description }}"
}
</script>

</head>
<body>
<header>
    <nav class="navbar">
        <div class="navbar-container">
            <!-- Brand/Logo -->
            <a href="/" class="navbar-brand">
                <div class="logo-container">
                    <svg class="navbar-logo-icon" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="4" y="6" width="32" height="28" rx="4" ry="4" fill="url(#logoGradient)" stroke="none"/>
                        <path d="M12 14h16M12 18h12M12 22h8M12 26h10" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
                        <circle cx="28" cy="24" r="2" fill="#ffffff"/>
                        <defs>
                            <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <div class="logo-text">
                        <span class="logo-main">Beta Shorts</span>
                        <span class="logo-tagline">Learn & Code</span>
                    </div>
                </div>
            </a>

            <!-- Hamburger Menu Button (Mobile) -->
            <button class="navbar-toggle" id="navbar-toggle" aria-label="Toggle navigation menu">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </button>

            <!-- Main Navigation -->
            <ul class="navbar-links" id="navbar-links">
                <li><a href="/" class="nav-link">Home</a></li>
                <li><a href="/blog/" class="nav-link">Blog</a></li>
                <li class="nav-divider"></li>
                <li><a href="/support.html" class="nav-link">Support</a></li>
                <li><a href="/privacy.html" class="nav-link">Privacy</a></li>
                <li><a href="/terms.html" class="nav-link">Terms</a></li>
            </ul>
        </div>
    </nav>
</header>

    <main>
        {{ content }}
    </main>

    <footer>
        <div class="footer-container">
            <p>© 2025 Beta Shorts. All Rights Reserved.</p>
        </div>
    </footer>

    <script>
        // Mobile menu toggle
        const navbarToggle = document.getElementById('navbar-toggle');
        const navbarLinks = document.getElementById('navbar-links');

        if (navbarToggle) {
            navbarToggle.addEventListener('click', () => {
                navbarLinks.classList.toggle('active');
                navbarToggle.classList.toggle('active');
            });

            // Close menu when a link is clicked
            const navLinks = navbarLinks.querySelectorAll('a');
            navLinks.forEach(link => {
                link.addEventListener('click', () => {
                    navbarLinks.classList.remove('active');
                    navbarToggle.classList.remove('active');
                });
            });
        }

        // Close menu when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.navbar') && navbarLinks.classList.contains('active')) {
                navbarLinks.classList.remove('active');
                navbarToggle.classList.remove('active');
            }
        });
    </script>
</body>
</html>
